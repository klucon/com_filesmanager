name: Release package

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Manual version bump override"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - patch
          - minor
          - major
  push:
    branches: [main]
    paths-ignore:
      - "src/components/com_filesmanager/manifest.json"
      - "pyproject.toml"
      - "RELEASE_NOTES.md"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip release]') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build

      - name: Prepare version
        id: version
        env:
          MANUAL_BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || '' }}
        run: python .github/scripts/prepare_release.py --bump "$MANUAL_BUMP"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

      - name: Validate manifest version
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path("src/components/com_filesmanager/manifest.json").read_text())
          expected = os.environ["EXPECTED_VERSION"]
          if manifest["version"] != expected:
              raise SystemExit(
                  f"manifest.version {manifest['version']} does not match expected {expected}"
              )
          required = {
              "schema_version", "name", "type", "vendor", "extension_id",
              "display_name", "description", "version", "license",
              "compatibility", "package",
          }
          missing = sorted(required - manifest.keys())
          if missing:
              raise SystemExit(f"manifest.json missing required keys: {', '.join(missing)}")
          if manifest["extension_id"] != f"{manifest['vendor']}/{manifest['name']}":
              raise SystemExit("extension_id must be vendor/name")
          PY

      - name: Build ZIP package
        run: |
          python - <<'PY'
          import json, zipfile
          from pathlib import Path

          root = Path("src/components/com_filesmanager")
          manifest = json.loads((root / "manifest.json").read_text())
          package_name = f"{manifest['name']}-{manifest['version']}"
          out = Path(f"{package_name}.zip")
          with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
              for path in sorted(root.rglob("*")):
                  rel = path.relative_to(root)
                  if "__pycache__" in rel.parts or path.suffix in {".pyc", ".pyo"}:
                      continue
                  if path.is_file():
                      zf.write(path, Path(package_name) / rel)
          print(out)
          PY

      - name: Build wheel
        run: python -m build

      - name: Generate checksum
        run: sha256sum com_filesmanager-*.zip > SHA256SUMS

      - name: Commit version files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/components/com_filesmanager/manifest.json RELEASE_NOTES.md
          git diff --cached --quiet && exit 0
          git commit -m "chore(release): ${{ steps.version.outputs.tag }} [skip ci] [skip release]"
          git push origin HEAD:main

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - uses: actions/upload-artifact@v7
        with:
          name: com_filesmanager-package
          path: |
            com_filesmanager-*.zip
            SHA256SUMS
            dist/*

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            com_filesmanager-*.zip
            SHA256SUMS
            dist/*
          body_path: RELEASE_NOTES.md
